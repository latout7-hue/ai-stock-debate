<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme:dark)">
  <title>Archive — AI Stock Debate</title>
  <style>
  :root {
    --bg:        #ffffff; --surface:  #f5f5f7; --border: #d2d2d7;
    --text:      #1d1d1f; --secondary:#6e6e73; --accent: #0071e3;
    --green:     #1a7f47; --green-bg: #d1fae5;
    --blue:      #1e40af; --blue-bg:  #dbeafe;
    --red:       #9b1c1c; --red-bg:   #fee2e2;
    --amber:     #78350f; --amber-bg: #fef3c7;
    --purple:    #5b21b6; --purple-bg:#ede9fe;
    --gray-text: #374151; --gray-bg:  #f3f4f6;
    --tab-h: 56px; --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#000; --surface:#1c1c1e; --border:#38383a;
      --text:#f5f5f7; --secondary:#98989f; --accent:#0a84ff;
      --green:#30d158; --green-bg:#0a2a1a;
      --blue:#64d2ff;  --blue-bg:#0a1a2a;
      --red:#ff453a;   --red-bg:#2a0a0a;
      --amber:#ffd60a; --amber-bg:#2a1f00;
      --purple:#bf5af2;--purple-bg:#1a0a2a;
      --gray-text:#ebebf5; --gray-bg:#2c2c2e;
    }
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{font-family:-apple-system,"SF Pro Text",BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
       background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
       padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 8px);}
  a{color:var(--accent);text-decoration:none;}

  /* lang toggle */
  .lang-btn{display:flex;gap:4px;}
  .lang-btn button{
    background:none;border:1px solid var(--border);border-radius:6px;
    padding:4px 10px;font-size:12px;font-weight:600;color:var(--secondary);cursor:pointer;
    font-family:inherit;
  }
  .lang-btn button.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* hide/show by language */
  body.ko .en{display:none!important;}
  body.en .ko{display:none!important;}

  /* topnav */
  .topnav{
    position:sticky;top:0;z-index:100;height:52px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;border-bottom:1px solid var(--border);
    background:rgba(255,255,255,.85);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
  }
  @media(prefers-color-scheme:dark){.topnav{background:rgba(0,0,0,.85);}}
  .topnav-brand{font-size:16px;font-weight:600;letter-spacing:-.01em;}
  .topnav-right{display:flex;align-items:center;gap:10px;}
  .topnav-date{font-size:12px;color:var(--secondary);}

  /* tab bar */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;
    height:calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom:var(--safe-bottom);
    display:flex;z-index:100;border-top:1px solid var(--border);
    background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
  }
  @media(prefers-color-scheme:dark){.tabbar{background:rgba(0,0,0,.92);}}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
       font-size:10px;font-weight:500;color:var(--secondary);gap:3px;
       text-decoration:none;-webkit-tap-highlight-color:transparent;}
  .tab.active{color:var(--accent);}
  .tab svg{width:22px;height:22px;}

  /* layout */
  .page{max-width:680px;margin:0 auto;padding:0 16px;}
  .section{padding:32px 0;border-bottom:1px solid var(--border);}
  .section:last-of-type{border-bottom:none;}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.1em;
                 text-transform:uppercase;color:var(--secondary);margin-bottom:18px;}

  /* hero */
  .hero{padding:40px 0 32px;text-align:center;border-bottom:1px solid var(--border);}
  .hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;
                text-transform:uppercase;color:var(--secondary);margin-bottom:10px;}
  .hero-title{font-size:clamp(28px,7vw,44px);font-weight:700;
              letter-spacing:-.03em;line-height:1.08;margin-bottom:10px;}
  .hero-sub{font-size:14px;color:var(--secondary);line-height:1.5;}

  /* macro outlook */
  .macro-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;}
  .macro-card{background:var(--surface);border-radius:14px;padding:16px 18px;}
  .macro-header{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;
                align-items:baseline;gap:5px;flex-wrap:wrap;}
  .macro-firm{font-weight:400;color:var(--secondary);font-size:12px;}
  .macro-text{font-size:13px;color:var(--secondary);line-height:1.6;}

  /* bullet list */
  .bullet-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px;}
  .bullet-list li{font-size:13px;color:var(--secondary);line-height:1.5;
                  padding-left:18px;position:relative;}
  .bullet-list li::before{content:"•";position:absolute;left:0;
                           color:var(--accent);font-weight:700;font-size:15px;line-height:1.3;}

  /* today's summary */
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
  .summary-card{background:var(--surface);border-radius:14px;padding:16px 18px;}
  .summary-card.risk{background:var(--red-bg);}
  @media(prefers-color-scheme:dark){.summary-card.risk{background:rgba(155,28,28,.15);}}
  .summary-card-label{font-size:11px;font-weight:700;letter-spacing:.08em;
                       text-transform:uppercase;color:var(--secondary);margin-bottom:12px;}

  /* pick cards */
  .picks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}
  .pick-card{background:var(--surface);border-radius:16px;padding:22px 20px 18px;}
  .pick-rank{font-size:11px;font-weight:700;color:var(--secondary);margin-bottom:4px;letter-spacing:.05em;}
  .pick-ticker{font-size:11px;font-weight:500;color:var(--secondary);margin-bottom:4px;}
  .pick-name{font-size:19px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;}
  .pick-change{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px;}
  .pick-label{font-size:12px;font-weight:400;color:var(--secondary);}
  .pick-signals{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
  .pick-why-label{font-size:11px;font-weight:700;letter-spacing:.06em;
                  text-transform:uppercase;color:var(--secondary);margin-bottom:10px;}

  /* signal pill */
  .pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;
        white-space:nowrap;display:inline-block;}

  /* top 10 list */
  .rank-list{display:flex;flex-direction:column;gap:1px;
             background:var(--border);border-radius:14px;overflow:hidden;}
  .rank-item{background:var(--bg);padding:14px 16px;
             display:flex;align-items:center;gap:12px;}
  .rank-item.selected{background:var(--green-bg);}
  .rank-num{font-size:11px;font-weight:700;color:var(--secondary);width:24px;flex-shrink:0;}
  .rank-info{flex:1;min-width:0;}
  .rank-name{font-size:15px;font-weight:600;margin-bottom:2px;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-sector{font-size:12px;color:var(--secondary);margin-bottom:5px;}
  .rank-sigs{display:flex;flex-wrap:wrap;gap:3px;}
  .rank-right{text-align:right;flex-shrink:0;}
  .rank-change{font-size:15px;font-weight:700;}
  .rank-meta{font-size:11px;color:var(--secondary);margin-top:2px;}
  .sel-badge{display:inline-block;background:var(--green);color:#fff;
             font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;
             margin-left:5px;vertical-align:middle;letter-spacing:.04em;}

  /* collapsible toggle (debate + fact-check) */
  .panel-toggle{
    width:100%;background:var(--surface);border:none;border-radius:12px;
    padding:16px 18px;font-size:15px;font-weight:600;color:var(--accent);
    cursor:pointer;text-align:left;font-family:inherit;
    display:flex;justify-content:space-between;align-items:center;
    -webkit-tap-highlight-color:transparent;
  }
  .panel-toggle:active{opacity:.7;}
  .panel-body{display:none;margin-top:16px;}
  .panel-body.open{display:block;}
  .debate-round-label{font-size:11px;font-weight:700;letter-spacing:.1em;
                      text-transform:uppercase;color:var(--secondary);
                      margin:24px 0 12px;}
  .debate-round-label:first-child{margin-top:0;}
  .agent-list{display:flex;flex-direction:column;gap:1px;
              background:var(--border);border-radius:14px;overflow:hidden;}
  .agent-card{background:var(--bg);padding:18px 16px 16px;}
  .agent-meta{font-size:14px;font-weight:600;margin-bottom:6px;}
  .agent-firm{font-size:12px;color:var(--secondary);font-weight:400;margin-left:5px;}
  .agent-text{font-size:13px;color:var(--secondary);line-height:1.6;white-space:pre-wrap;}

  /* fact-check card */
  .fact-card{background:var(--blue-bg);border-radius:14px;padding:16px 18px;}
  @media(prefers-color-scheme:dark){.fact-card{background:rgba(30,64,175,.12);}}
  .fact-card-header{font-size:14px;font-weight:600;margin-bottom:8px;}
  .fact-card-firm{font-weight:400;color:var(--secondary);font-size:12px;margin-left:4px;}
  .fact-text{font-size:13px;color:var(--gray-text);line-height:1.65;white-space:pre-wrap;}
  @media(prefers-color-scheme:dark){.fact-text{color:var(--secondary);}}

  /* verdicts */
  .verdict-list{display:flex;flex-direction:column;gap:1px;
                background:var(--border);border-radius:14px;overflow:hidden;}
  .verdict-item{background:var(--bg);padding:14px 16px;}
  .verdict-name{font-size:14px;font-weight:600;margin-bottom:5px;}
  .verdict-yes{color:var(--green);font-weight:600;font-size:14px;}
  .verdict-no{color:var(--secondary);font-size:14px;}

  /* devil's advocate */
  .da-card{background:var(--amber-bg);border:1px solid var(--amber);
           border-radius:14px;padding:18px;}
  @media(prefers-color-scheme:dark){
    .da-card{background:rgba(120,53,15,.15);border-color:var(--amber);}
  }
  .da-header{display:flex;justify-content:space-between;align-items:flex-start;
             margin-bottom:14px;gap:10px;flex-wrap:wrap;}
  .da-meta{font-size:14px;font-weight:600;}
  .da-firm{font-weight:400;color:var(--secondary);font-size:12px;margin-left:4px;}
  .da-text{font-size:13px;line-height:1.65;color:var(--gray-text);white-space:pre-wrap;}
  @media(prefers-color-scheme:dark){.da-text{color:var(--secondary);}}
  .verdict-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;
                 white-space:nowrap;display:inline-block;}

  /* archive */
  .archive-list{display:flex;flex-direction:column;gap:1px;
                background:var(--border);border-radius:14px;overflow:hidden;}
  .archive-item{background:var(--bg);padding:14px 16px;
                display:flex;align-items:center;justify-content:space-between;
                text-decoration:none;color:var(--text);
                -webkit-tap-highlight-color:transparent;}
  .archive-item:active{background:var(--surface);}
  .archive-date{font-size:15px;font-weight:600;}
  .archive-picks{font-size:12px;color:var(--secondary);margin-top:2px;}
  .archive-chev{color:var(--border);font-size:20px;}

  .footer{padding:24px 0;text-align:center;font-size:12px;color:var(--secondary);}
</style>
</head>
<body>
  
  <div class="topnav">
    <span class="topnav-brand"><span class="en">AI Stock Debate</span><span class="ko">AI 주식 토론</span></span>
    <div class="topnav-right">
      <span class="topnav-date">Archive</span>
      <div class="lang-btn">
        <button data-lang="en">EN</button>
        <button data-lang="ko">한국어</button>
      </div>
    </div>
  </div>
  
  <div class="page">
    <div class="section" style="padding-top:24px;">
      <div class="section-label">
        <span class="en">Past Debates</span><span class="ko">지난 토론</span>
      </div>
      <div class="archive-list">
      <a href="debates/2026-03-02.html" class="archive-item">
        <div>
          <div class="archive-date">2026-03-02</div>
          <div class="archive-picks">HD현대로보틱스 · 현대건설</div>
        </div>
        <div class="archive-chev">›</div>
      </a></div>
    </div>
    <div class="footer">
      <span class="en">Updated daily at 9:00 KST</span>
      <span class="ko">매일 오전 9시 KST 업데이트</span>
    </div>
  </div>
  
  <nav class="tabbar">
    <a href="index.html" class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span class="en">Today</span><span class="ko">오늘</span>
    </a>
    <a href="archive.html" class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="2" y="3" width="20" height="5" rx="1"/>
        <path d="M2 8h20v13a1 1 0 01-1 1H3a1 1 0 01-1-1V8z"/>
        <path d="M10 12h4"/>
      </svg>
      <span class="en">Archive</span><span class="ko">아카이브</span>
    </a>
  </nav>
  <script>
  // Language detection & toggle
  (function(){
    const saved = localStorage.getItem('lang');
    const browser = navigator.language.startsWith('ko') ? 'ko' : 'en';
    const lang = saved || browser;
    document.body.classList.add(lang);
    document.querySelectorAll('.lang-btn button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
      btn.onclick = () => {
        const l = btn.dataset.lang;
        document.body.classList.remove('ko','en');
        document.body.classList.add(l);
        localStorage.setItem('lang', l);
        document.querySelectorAll('.lang-btn button').forEach(b =>
          b.classList.toggle('active', b.dataset.lang === l));
      };
    });
  })();

  // Generic collapsible panel toggle
  function togglePanel(btn) {
    const body = btn.nextElementSibling;
    const open = body.classList.toggle('open');
    const showEn = btn.dataset.showEn || 'Show ↓';
    const hideEn = btn.dataset.hideEn || 'Hide ↑';
    const showKo = btn.dataset.showKo || '보기 ↓';
    const hideKo = btn.dataset.hideKo || '숨기기 ↑';
    btn.querySelector('.en').textContent = open ? hideEn : showEn;
    btn.querySelector('.ko').textContent = open ? hideKo : showKo;
  }
</script>
</body>
</html>
